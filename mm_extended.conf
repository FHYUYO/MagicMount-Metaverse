# ===== Magic Mount Metaverse Extended Config =====
# Author: GitHub@FHYUYO/酷安@枫原羽悠
# Version: v3.0
# This file contains extended settings for shell scripts only.
# These settings are NOT parsed by mmd binary.

# ====== Stealth Settings ======
# Enable advanced stealth features
stealth_mode=false
# Randomize module ID on each boot
randomize_id=false
# Hide mount operations from log
hide_mount_logs=false
# Use alternate module path
alternate_path=
# Spoof module name in listings
spoof_name=
# Hide module from module list (KSU specific)
hide_from_list=false

# ====== Anti-Detection Settings ======
# Bypass common root detection
bypass_detection=true

# ====== Performance Settings ======
# Startup optimization level (0=off, 1=fast, 2=ultra)
# 0: Standard - Use global mount mode for all modules
# 1: Fast - Reduced wait time, use global mode
# 2: Ultra - Per-module mount modes, maximum performance
optimization_level=0
# Delay before mounting (ms)
mount_delay=0
# Enable parallel mounting
parallel_mount=false

# ====== Mount Mode Settings (v3.0) ======
# Global mount mode: magic | overlayfs
# magic: Use mmd single directory mount
# overlayfs: Use mm_overlay dual directory mount (metadata + content separation)
mount_mode=magic
# Per-module mount modes (JSON format)
# Format: {"module_id": "overlayfs", "another_module": "magic"}
# Supported modes: magic, overlayfs
# Note: ignore mode has been removed in v3.0
# Modules not specified will use the global mount_mode setting
# Examples:
#   {"SomeModule": "overlayfs", "AnotherModule": "magic"}
module_mount_modes={}
# Enable modules.img for overlayfs mode
enable_modules_img=true
