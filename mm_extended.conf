# ===== Magic Mount Metaverse Extended Config =====
# Author: GitHub@FHYUYO
# Version: v3.4
# This file contains extended settings for shell scripts only.

# ====== Stealth Settings ======
stealth_mode=false
randomize_id=false
hide_mount_logs=false
hide_from_list=false

# ====== Mount Mode Settings ======
# Global mount mode: magic | overlayfs
mount_mode=magic
# Per-module mount modes (JSON format)
# Format: {"module_id": "overlayfs", "another_module": "magic"}
module_mount_modes={}

# ====== Force Mount Settings (v3.3+) ======
# Force mount specific modules even if they have ignore or skip_mount marker
# Format: {"module_name1": true, "module_name2": true}
force_mount_modules={}

# ====== Custom Ignore Settings (v3.4) ======
# Custom ignore - completely skip this module from overlayfs and magic mount
# This is independent from force_mount
# Format: {"module_name1": "ignore", "module_name2": "ignore"}
ignored_modules={}

# ====== Performance Settings ======
# 0: Disabled (standard), 1: Fast, 2: Ultra (per-module)
optimization_level=0
# Delay before mounting (ms)
mount_delay=0
# Enable parallel mounting
parallel_mount=false

# Enable modules.img for overlayfs mode
enable_modules_img=true
